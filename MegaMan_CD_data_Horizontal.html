<!-- If you want to center the card, you can replace the line of code below with:

<div class="card text-center border-0 mx-auto" style="width: 550px; background-color: #e04808; border-radius: 15px; font-family: Arial, sans-serif; font-size: 11px;"> 

-->
<div class="card text-center border-0" style="width: 550px; background-color: #e04808; margin: 12px; border-radius: 15px; font-family: Arial, sans-serif; font-size: 11px;">
  
  <div class="row g-0 align-items-center p-2">
    
    <div class="col-6 d-flex justify-content-center">
      <div class="card-body p-2">
      
      <!-- Change Image HERE -->
        
        <img src="https://placehold.co/768x1024/f5f5f5/262626.png?text=3%3A4" 
             width="250" 
             class="img-fluid" 
             style="border-radius: 15px;" 
             alt="Character Image">
      </div>
    </div>

    <div class="col-6">
      <div class="m-1 p-0 text-white" style="background-color: #405820; border-radius: 10px; border-bottom: 8px solid #f87000; overflow: hidden;">
        
        <div class="py-1 fw-bold text-uppercase" style="background-color: #e04808; border: 4px solid #f87000; border-bottom: 2px solid #f87000; border-top-left-radius: 10px; border-top-right-radius: 10px; font-size: 18px; font-family:'Courier New', Courier, 'Lucida Console', monospace;">
          <strong>• CD data •</strong>
        </div>
        
        <!-- Change Description text HERE -->
        <div class="p-2 text-start" style="font-size: 17px;">
          <p class="mb-2">Lorem ipsum dolor sit amet consectetur adipiscing elit ante, ultricies nec eu taciti sapien pretium.</p>
          
          <!-- Change Dialogue text HERE -->
          <p class="text-center italic mb-0" style="font-size: 15px; color: #f8e028;"><strong><em>"Hey, Lorem ipsum is cool!"</em></strong></p>
        </div>

        <div style="border-bottom: 2px solid #f87000;"></div>

        <div class="p-2 text-end" style="font-size: 11px;">
          
          <div class="row g-0 mb-1">
            <div class="col-6 fw-bold" style="font-size: 15px; color: #33CC70; padding-right: 5px;"><strong>Good Point:</strong></div>
            
            <!-- Change Good Point text HERE -->
            <div class="col-6 text-start" style="font-size: 15px; padding-left: 5px;">Nice</div>
          </div>
          
          <div class="row g-0 mb-1">
            <div class="col-6 fw-bold" style="font-size: 15px; color: #33CC70; padding-right: 5px;"><strong>Bad Point:</strong></div>
            
            <!-- Change Bad Point text HERE -->
            <div class="col-6 text-start" style="font-size: 15px; padding-left: 5px;">Not Cool</div>
          </div>
          
          <div class="row g-0 mb-1">
            <div class="col-6 fw-bold" style="font-size: 15px; color: #33CC70; padding-right: 5px;"><strong>Like:</strong></div>
            
            <!-- Change Like text HERE -->
            <div class="col-6 text-start" style="font-size: 15px; padding-left: 5px;">Lorem</div>
          </div>
          
          <div class="row g-0">
            <div class="col-6 fw-bold" style="font-size: 15px; color: #33CC70; padding-right: 5px;"><strong>Dislike:</strong></div>
            
            <!-- Change Dislike text HERE -->
            <div class="col-6 text-start" style="font-size: 15px; padding-left: 5px;">Boring Text</div>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>
